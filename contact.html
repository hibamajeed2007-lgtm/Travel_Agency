<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="CSS/contact.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a href="home.html">
          <img src="IMAGES/logo1.png" alt="" width="240px" height="245px" />
        </a>
        <nav>
          <a href="home.html">Home</a>
          <a href="about.html">About</a>
          <a href="destination.html">Destinations</a>
          <a href="contact.html">Contact</a>
        </nav>
      </header>

      <section class="hero">
        <figure class="hero-image">
          <img src="IMAGES/hero.jpg" alt="Keep in touch" />
        </figure>

        <section class="hero-content">
          <h1>Keep in Touch</h1>
          <p>Home / Contact</p>
        </section>
      </section>
      <section class="contact-section">
        <article class="map">
          <iframe
            src="https://maps.google.com/maps?q=karachi&t=&z=13&ie=UTF8&iwloc=&output=embed"
          ></iframe>
        </article>

        <article class="form-area">
          <h2>We will be in touch shortly</h2>

          <form id="contactForm">
            <label>Name</label>
            <input type="text" name="name" />

            <label>Email</label>
            <input type="email" name="email" />

            <label>Message</label>
            <textarea name="message"></textarea>

            <button type="submit">Send Message</button>
          </form>
        </article>
      </section>

      <footer>
        <section class="footer-links">
          <h4>Quick Links</h4>
          <nav>
            <a href="home.html">Home</a>
            <a href="destination.html">Destinations</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
          </nav>
        </section>

        <section class="footer-newsletter">
          <h4>Subscribe Our Newsletter For Getting Quick Updates</h4>

          <form>
            <input
              type="email"
              id="email"
              placeholder="Your Email Address"
              required
            />
            <button type="submit">SUBSCRIBE</button>
          </form>
        </section>

        <section class="footer-social">
          <h4>Follow Us</h4>

          <a href="https://www.facebook.com/" target="_blank">
            <img src="IMAGES/facebook.jpg" alt="Facebook" width="40" />
          </a>

          <a href="https://www.instagram.com/" target="_blank">
            <img src="IMAGES/instagramm.jpg" alt="Instagram" width="40" />
          </a>

          <a href="https://x.com/" target="_blank">
            <img src="IMAGES/twitter.jpg" alt="Twitter" width="40" />
          </a>
        </section>
      </footer>
    </div>
  </body>
</html>
