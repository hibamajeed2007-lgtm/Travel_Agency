<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="CSS/contact.css" />
  </head>
  <body>
    <header>
      <h1>Nextrip Travels</h1>
      <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="destination.html">Destinations</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <figure class="hero-image">
        <img src="IMAGES/hero.jpg" alt="Keep in touch" />
      </figure>

      <header class="hero-content">
        <h1>Keep in Touch</h1>
        <p>Home / Contact</p>
      </header>
    </section>
    <section class="contact-section">
      <article class="map">
        <iframe
          src="https://maps.google.com/maps?q=karachi&t=&z=13&ie=UTF8&iwloc=&output=embed"
        ></iframe>
      </article>

      <article class="form-area">
        <h2>We will be in touch shortly</h2>

        <form id="contactForm">
          <label>Name</label>
          <input type="text" name="name" />

          <label>Email</label>
          <input type="email" name="email" />

          <label>Message</label>
          <textarea name="message"></textarea>

          <button type="submit">Send Message</button>
        </form>
      </article>
    </section>
    <!-- Image Map Generated by http://www.image-map.net/ -->
    <img src="IMAGES/facebook.png" usemap="#image-map" width="50" height="50" />

    <map name="image-map">
      <area
        target="_blank"
        alt="facebook"
        title="facebook"
        href="https://www.facebook.com/"
        coords="0,9,321,347"
        shape="rect"
      />
    </map>
    <!-- Image Map Generated by http://www.image-map.net/ -->
    <img
      src="IMAGES/instagramm.avif"
      usemap="#instagram-map"
      width="50"
      height="50"
    />

    <map name="instagram-map">
      <area
        target="_blank"
        alt="instagram"
        title="instagram"
        href="https://www.instagram.com/"
        coords="0,0,50,50"
        shape="rect"
      />
    </map>

    <img
      src="IMAGES/twitter.avif"
      usemap="#twitter-map"
      width="45"
      height="45"
    />

    <map name="twitter-map">
      <area
        target="_blank"
        alt="twitter"
        title="twitter"
        href="https://x.com/"
        coords="9,0,733,715"
        shape="rect"
      />
    </map>
  </body>
</html>
